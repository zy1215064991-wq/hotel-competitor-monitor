<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>酒店竞对监控 API 组合版</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">WorkBuddy 本地部署包</p>
          <h1>酒店竞对监控 API 组合版</h1>
        </div>
        <div class="status-pill">API-first</div>
      </header>

      <section class="panel is-active">
        <div class="section-head">
          <h2>基础配置</h2>
          <p>填写本店、商圈/POI、半径和查询口径。向导只生成本地配置，不保存任何 API Key。</p>
        </div>

        <div class="checklist">
          <label><input type="checkbox" id="keyReady"> 已在 Windows 环境变量中配置 AMAP_API_KEY、FLYAI_API_KEY、BAIDU_MAP_AK</label>
          <label><input type="checkbox" id="clawbotReady"> 已在 WorkBuddy 中绑定微信助理 ClawBot</label>
        </div>

        <div class="grid three form-grid">
          <label class="field"><span>城市</span><input id="city" value="上海"></label>
          <label class="field"><span>本店名称</span><input id="homeHotelName" value="桔子水晶上海江桥万达酒店"></label>
          <label class="field"><span>商圈/POI</span><input id="poiName" value="江桥万达"></label>
          <label class="field"><span>入住偏移天数</span><input id="offsetDays" type="number" min="0" value="7"></label>
          <label class="field"><span>入住晚数</span><input id="nights" type="number" min="1" value="1"></label>
          <label class="field"><span>目标房型</span><input id="roomType" value="大床房"></label>
          <label class="field"><span>搜索半径米</span><input id="radiusMeters" type="number" min="500" step="500" value="2000"></label>
          <label class="field"><span>候选池上限</span><input id="maxCandidates" type="number" min="5" max="100" value="20"></label>
          <label class="field"><span>核心竞品半径</span><input id="coreRadiusMeters" type="number" min="100" step="100" value="2000"></label>
          <label class="field"><span>价格压力比例</span><input id="pricePressureRatio" type="number" min="0.1" max="1" step="0.05" value="0.75"></label>
          <label class="field"><span>品质评分阈值</span><input id="qualityRatingThreshold" type="number" min="0" max="5" step="0.1" value="4.7"></label>
          <label class="field"><span>品质压力半径</span><input id="qualityRadiusMeters" type="number" min="100" step="100" value="2500"></label>
          <label class="field"><span>房间数</span><input id="rooms" type="number" min="1" value="1"></label>
          <label class="field"><span>成人数</span><input id="adults" type="number" min="1" value="1"></label>
          <label class="field"><span>儿童数</span><input id="children" type="number" min="0" value="0"></label>
          <label class="field"><span>竞对数量</span><input id="competitorCount" type="number" min="1" max="20" value="5"></label>
          <label class="field"><span>百度补充数量</span><input id="baiduEnrichTopN" type="number" min="0" max="30" value="10"></label>
          <label class="field"><span>启用历史对比</span>
            <select id="historyEnabled">
              <option value="true" selected>启用</option>
              <option value="false">关闭</option>
            </select>
          </label>
          <label class="field"><span>替代住宿</span>
            <select id="includeAlternativeLodging">
              <option value="true" selected>纳入替代竞品</option>
              <option value="false">剔除</option>
            </select>
          </label>
          <label class="field"><span>历史目录</span><input id="historyDirectory" value="data/history"></label>
          <label class="field"><span>最高价格</span><input id="maxPrice" type="number" min="0" value="600"></label>
          <label class="field"><span>排序</span>
            <select id="sort">
              <option value="distance_asc">距离优先</option>
              <option value="price_asc">低价优先</option>
              <option value="rate_desc">评分优先</option>
              <option value="no_rank">默认排序</option>
            </select>
          </label>
          <label class="field wide"><span>品牌补漏关键词</span><input id="brandKeywords" value="全季,亚朵,汉庭,如家精选"></label>
          <label class="field"><span>推送方式</span>
            <select id="pushMode">
              <option value="clawbot" selected>微信助理 ClawBot</option>
              <option value="wecom">企业微信群机器人</option>
              <option value="none">只保存本地</option>
            </select>
          </label>
        </div>

        <div class="actions">
          <button class="primary" id="generateFiles">生成预览</button>
          <button id="downloadConfig">下载 hotel-monitor.json</button>
          <button id="downloadAutomation">下载 automation-prompt.md</button>
          <button id="downloadDaily">下载 daily-prompt.md</button>
          <button id="copyRunPrompt">复制运行提示词</button>
        </div>

        <div class="tabs">
          <button class="tab is-active" data-preview="config">hotel-monitor.json</button>
          <button class="tab" data-preview="automation">automation-prompt.md</button>
          <button class="tab" data-preview="daily">daily-prompt.md</button>
        </div>

        <textarea class="prompt-box preview" id="filePreview" readonly></textarea>
      </section>
    </main>

    <div class="toast" id="toast" role="status"></div>
    <script src="./app.js"></script>
  </body>
</html>
