name: Zero-quota tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  npm-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run local tests
        run: npm test
